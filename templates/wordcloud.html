{% extends "base.html" %}
{% block title %}词云 - 藏医多模态知识图谱{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
{% endblock %}
{% block content %}
<h1 class="page-title">概念词云</h1>
<div class="wordcloud-wrap" id="wordcloud-container" style="width:100%; height:520px;"></div>
<p style="margin-top:0.5rem; color:#8b949e; font-size:0.9rem">展示知识图谱中概念出现的频次，字体越大表示出现越多。</p>
{% endblock %}
{% block script %}
<script>
(function() {
  var container = document.getElementById('wordcloud-container');

  fetch('{{ url_for("api_wordcloud") }}')
    .then(function(r) {
      if (r.status === 401) { window.location.href = '{{ url_for("login") }}'; return []; }
      if (!r.ok) throw new Error(r.statusText);
      return r.json();
    })
    .then(function(data) {
      if (!Array.isArray(data) || data.length === 0) {
        container.innerHTML = '<p style="color:#8b949e; padding:2rem">暂无词云数据</p>';
        return;
      }
      var list = data
        .filter(function(x) { return x && x.name && String(x.name).trim(); })
        .map(function(x) { return { name: String(x.name).trim(), value: Number(x.value) || 1 }; });
      list = list.slice(0, 200);

      var chart = echarts.init(container);
      chart.setOption({
        backgroundColor: '#0d1117',
        tooltip: { show: true },
        series: [{
          type: 'wordCloud',
          shape: 'circle',
          left: 'center',
          top: 'center',
          width: '100%',
          height: '100%',
          right: null,
          bottom: null,
          sizeRange: [14, 52],
          rotationRange: [-30, 30],
          rotationStep: 15,
          gridSize: 10,
          drawOutOfBound: false,
          textStyle: {
            fontFamily: 'Noto Sans SC, Microsoft YaHei, sans-serif',
            color: function() {
              var colors = ['#7ee787', '#a5d6ff', '#d2a8ff', '#ffa657', '#79c0ff'];
              return colors[Math.floor(Math.random() * colors.length)];
            }
          },
          data: list
        }]
      });
      window.addEventListener('resize', function() { chart.resize(); });
    })
    .catch(function(err) {
      container.innerHTML = '<p style="color:#f85149">加载词云失败：' + (err.message || '') + '</p>';
    });
})();
</script>
{% endblock %}
